name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Java 21 + PostgreSQL)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: ecommerce_db
          POSTGRES_USER: postgres
          # trust auth matches the blank password in application.properties, so
          # the context-load test connects without any credential overrides.
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d ecommerce_db"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Load schema into PostgreSQL
        # schema.sql opens with DROP/CREATE DATABASE lines meant for a manual
        # bootstrap; ecommerce_db already exists here, so ON_ERROR_STOP=0 skips
        # those two no-ops and still applies every table, index and seed row.
        run: psql -h localhost -p 5432 -U postgres -d ecommerce_db -v ON_ERROR_STOP=0 -f db/schema.sql

      - name: Run tests
        run: |
          chmod +x mvnw
          ./mvnw -B -ntp test

  build-and-push:
    name: Build & push image to GHCR
    needs: test
    # Only publish from main; PRs run tests but do not push an image.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=sha,format=long

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
